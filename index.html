<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>Expense Tracker</h1>
            <p class="subtitle">Track your daily spending</p>
        </header>

        <!-- Balance Section -->
        <section class="balance-section">
            <div class="balance-card">
                <h3>Current Balance</h3>
                <div class="balance" id="balance">$0.00</div>
            </div>
            <div class="stats">
                <div class="stat-card income">
                    <h4>Income</h4>
                    <p id="total-income">$0.00</p>
                </div>
                <div class="stat-card expense">
                    <h4>Expenses</h4>
                    <p id="total-expense">$0.00</p>
                </div>
            </div>
        </section>

        <!-- Add Transaction Form -->
        <section class="form-section">
            <h2>Add Transaction</h2>
            <form id="transaction-form">
                <div class="form-group">
                    <label for="description">Description</label>
                    <input 
                        type="text" 
                        id="description" 
                        placeholder="e.g., Groceries" 
                        required 
                    />
                </div>
                <div class="form-group">
                    <label for="amount">Amount (₦)</label>
                    <input 
                        type="number" 
                        id="amount" 
                        placeholder="0.00" 
                        step="0.01" 
                        min="0.01" 
                        required 
                    />
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            
                            <option value="">Select category</option>
                            <option value="food">Food</option>
                            <option value="salary">Salary</option>
                            <option value="transport">Transport</option>
                            <option value="entertainment">Entertainment</option>
                            <option value="shopping">Shopping</option>
                            <option value="bills">Bills</option>
                            <option value="health">Health</option>
                            <option value="education">Education</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type" required>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-add">Add Transaction</button>
            </form>
        </section>

        <!-- Transaction List -->
        <section class="transactions-section">
            <div class="transactions-header">
                <h2>Transaction History</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="income">Income</button>
                    <button class="filter-btn" data-filter="expense">Expenses</button>
                </div>
            </div>
            <div class="transactions-list" id="transactions-list">
                <p class="empty-msg">No transactions yet. Add one above.</p>
            </div>
            <button class="btn-clear" id="clear-all">Clear All</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
